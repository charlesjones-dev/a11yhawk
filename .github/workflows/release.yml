name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5
      - run: npm ci
      - run: npm run verify
      - run: npm publish

  docker:
    runs-on: ubuntu-latest
    # Job-scoped permissions: this job needs to push to GHCR; it does not get the
    # top-level id-token used by npm provenance.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version from tag
        id: meta
        # Tag is vX.Y.Z; the image version drops the leading "v".
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/charlesjones-dev/a11yhawk:${{ steps.meta.outputs.version }}
            ghcr.io/charlesjones-dev/a11yhawk:latest

name: Feature request
description: Suggest an idea or improvement for a11yhawk.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement. Please check the [roadmap](https://github.com/charlesjones-dev/a11yhawk#roadmap) and existing issues first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you would like a11yhawk to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
